<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Login | Ecofin Credit Souharda Sahakari Niyamit</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">

<style>
  body{ padding-top: 0; }
  .staff-login-wrap{
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(180deg, var(--navy-deep), var(--navy));
    padding: 2rem 1rem;
  }
  .staff-login-card{
    background: var(--beige-card);
    border-radius: var(--radius);
    padding: 2.5rem 2rem;
    max-width: 420px;
    width: 100%;
    box-shadow: var(--shadow-card);
    text-align: center;
  }
  .staff-login-card img{ height: 46px; margin-bottom: 1rem; }
  .staff-login-card h1{
    font-family: var(--font-display);
    font-size: 1.4rem;
    color: var(--navy);
    margin-bottom: 0.4rem;
  }
  .staff-login-card p.subtitle{
    color: var(--ink-soft);
    font-size: 0.92rem;
    margin-bottom: 1.6rem;
  }
  .back-home{
    display: inline-block;
    margin-top: 1.4rem;
    color: var(--orange-deep);
    font-weight: 600;
    text-decoration: none;
    font-size: 0.9rem;
  }
  .back-home:hover{ color: var(--orange); }
</style>
</head>
<body>

<div class="staff-login-wrap">
  <div class="staff-login-card">
    <img src="assets/Ecofin New Small trans.png" alt="Ecofin Credit Souharda Sahakari Logo">
    <h1>Staff Login</h1>
    <p class="subtitle">This portal is for authorized Ecofin Credit Souharda staff only.</p>

    <form onsubmit="return false;">
      <div class="mb-3 text-start">
        <label class="form-label">Staff ID / Username</label>
        <input type="text" class="form-control" placeholder="Enter your staff ID" disabled>
      </div>
      <div class="mb-3 text-start">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" placeholder="Enter your password" disabled>
      </div>
      <button type="submit" class="btn btn-orange w-100" disabled>Login</button>
      <p class="text-muted mt-3" style="font-size:0.82rem;">This staff login page is not yet connected to a login system.</p>
    </form>

    <a href="index.html" class="back-home"><i class="bi bi-arrow-left me-1"></i>Back to Home</a>
  </div>
</div>

</body>
</html>
